name: Meta Lead Store Opener Scoring

on:
  schedule:
    - cron: '0 10 * * *'   # Daily 3:30 PM IST
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Override start date YYYY-MM-DD (blank = auto from BigQuery, max 7 days back)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  score-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # Account-level fetch is fast — 30 min is generous

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery requests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Score leads
        env:
          GCP_PROJECT_ID:     ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET:   ${{ secrets.BIGQUERY_DATASET }}
          META_ACCESS_TOKEN:  ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GROK_API_KEY:       ${{ secrets.GROK_API_KEY }}
          # Only used if manually triggered with an override date
          LEADS_START_DATE:   ${{ github.event.inputs.start_date }}
        run: python meta_lead_scoring.py
