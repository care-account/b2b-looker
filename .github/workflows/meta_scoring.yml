name: Meta Lead Store Opener Scoring

on:
  schedule:
    - cron: '0 10 * * *'   # Daily 3:30 PM IST (10:00 UTC)
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Override start date (YYYY-MM-DD). Leave blank for auto.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  score-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # ← HARD STOP at 15 min — never hangs again
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery requests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Score leads
        timeout-minutes: 12    # ← script-level timeout (slightly under job timeout)
        env:
          GCP_PROJECT_ID:     ${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET:   ${{ secrets.BIGQUERY_DATASET }}
          META_ACCESS_TOKEN:  ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GROK_API_KEY:       ${{ secrets.GROK_API_KEY }}
          LEADS_START_DATE: ${{ github.event.inputs.start_date || secrets.LEADS_START_DATE || '2026-01-01' }}
        run: python meta_lead_scoring.py
